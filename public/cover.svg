<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <!-- 背景 -->
  <rect width="1200" height="675" fill="#f8f5f0"/>
  
  <!-- 渐变背景 -->
  <defs>
    <linearGradient id="headerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B4513"/>
      <stop offset="100%" stop-color="#D2691E"/>
    </linearGradient>
    <linearGradient id="editorGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f9f9f9"/>
    </linearGradient>
  </defs>
  
  <!-- 头部 -->
  <rect x="100" y="80" width="1000" height="80" fill="url(#headerGradient)" rx="8"/>
  <text x="150" y="130" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="white">NUT坚果.md</text>
  
  <!-- 工具栏 -->
  <rect x="100" y="170" width="1000" height="50" fill="#ffffff" rx="4" stroke="#e0d4c0" stroke-width="1"/>
  
  <!-- 工具栏按钮 -->
  <rect x="120" y="180" width="36" height="36" rx="4" fill="#f9f9f9" stroke="#e0d4c0" stroke-width="1"/>
  <text x="138" y="202" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">B</text>
  
  <rect x="166" y="180" width="36" height="36" rx="4" fill="#f9f9f9" stroke="#e0d4c0" stroke-width="1"/>
  <text x="184" y="202" font-family="Arial, sans-serif" font-size="16" font-style="italic" text-anchor="middle">i</text>
  
  <rect x="212" y="180" width="36" height="36" rx="4" fill="#f9f9f9" stroke="#e0d4c0" stroke-width="1"/>
  <text x="230" y="202" font-family="Arial, sans-serif" font-size="16" text-anchor="middle">S̶</text>
  
  <rect x="258" y="180" width="36" height="36" rx="4" fill="#f9f9f9" stroke="#e0d4c0" stroke-width="1"/>
  <text x="276" y="202" font-family="Arial, sans-serif" font-size="16" text-anchor="middle">{}</text>
  
  <!-- 编辑器容器 -->
  <rect x="100" y="230" width="1000" height="380" rx="8" fill="#ffffff" stroke="#e0d4c0" stroke-width="1"/>
  
  <!-- 分割线 -->
  <rect x="595" y="230" width="10" height="380" fill="#e0d4c0"/>
  
  <!-- 编辑区 -->
  <rect x="110" y="240" width="475" height="360" fill="url(#editorGradient)"/>
  <text x="130" y="270" font-family="'Courier New', monospace" font-size="14" fill="#333333"># 标题示例</text>
  <text x="130" y="300" font-family="'Courier New', monospace" font-size="14" fill="#333333">这是一个**粗体**文本和*斜体*文本的示例。</text>
  <text x="130" y="330" font-family="'Courier New', monospace" font-size="14" fill="#333333">- 无序列表项</text>
  <text x="130" y="360" font-family="'Courier New', monospace" font-size="14" fill="#333333">1. 有序列表项</text>
  
  <!-- 代码块 -->
  <rect x="130" y="380" width="435" height="80" fill="#f4f4f4" rx="4"/>
  <text x="140" y="400" font-family="'Courier New', monospace" font-size="12" fill="#666666">function hello() {</text>
  <text x="160" y="420" font-family="'Courier New', monospace" font-size="12" fill="#666666">  console.log('Hello World');</text>
  <text x="140" y="440" font-family="'Courier New', monospace" font-size="12" fill="#666666">}</text>
  
  <!-- 预览区 -->
  <rect x="615" y="240" width="475" height="360" fill="#f9f9f9"/>
  <text x="635" y="270" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#333333">标题示例</text>
  <text x="635" y="300" font-family="Arial, sans-serif" font-size="14" fill="#333333">这是一个</text>
  <text x="700" y="300" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333333">粗体</text>
  <text x="730" y="300" font-family="Arial, sans-serif" font-size="14" fill="#333333">文本和</text>
  <text x="780" y="300" font-family="Arial, sans-serif" font-size="14" font-style="italic" fill="#333333">斜体</text>
  <text x="810" y="300" font-family="Arial, sans-serif" font-size="14" fill="#333333">文本的示例。</text>
  
  <text x="635" y="330" font-family="Arial, sans-serif" font-size="14" fill="#333333">• 无序列表项</text>
  <text x="635" y="360" font-family="Arial, sans-serif" font-size="14" fill="#333333">1. 有序列表项</text>
  
  <!-- 预览区代码块 -->
  <rect x="635" y="380" width="435" height="80" fill="#f4f4f4" rx="4"/>
  <text x="645" y="400" font-family="'Courier New', monospace" font-size="12" fill="#666666">function hello() {</text>
  <text x="665" y="420" font-family="'Courier New', monospace" font-size="12" fill="#666666">  console.log('Hello World');</text>
  <text x="645" y="440" font-family="'Courier New', monospace" font-size="12" fill="#666666">}</text>
  
  <!-- 坚果图标 -->
  <g transform="translate(1000, 120) scale(0.8)">
    <ellipse cx="50" cy="50" rx="40" ry="45" fill="#8B4513"/>
    <ellipse cx="50" cy="45" rx="35" ry="40" fill="#D2691E"/>
    <path d="M30,50 Q50,30 70,50 Q50,70 30,50" fill="#CD853F"/>
    <circle cx="40" cy="45" r="5" fill="#8B4513"/>
    <circle cx="60" cy="45" r="5" fill="#8B4513"/>
  </g>
  
  <!-- 底部信息 -->
  <text x="600" y="650" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#666666">在线Markdown编辑器</text>
</svg>